<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ekran Skrinshoti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      padding: 3rem 2rem;
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f0f0ee;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
    }

    p {
      font-size: 15px;
      color: #666;
      max-width: 320px;
      line-height: 1.6;
    }

    #startBtn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      border: none;
      transition: opacity 0.15s;
    }

    #startBtn:hover { opacity: 0.85; }
    #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #statusMsg {
      font-size: 13px;
      color: #888;
      display: none;
    }

    #previewBox {
      display: none;
      width: 100%;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .preview-header span {
      font-size: 13px;
      font-weight: 600;
    }

    #downloadBtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      border: 1px solid #ccc;
      color: #1a1a1a;
      transition: background 0.15s;
    }

    #downloadBtn:hover { background: #f0f0ee; }

    #preview {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      display: block;
    }

    #errorBox {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      font-size: 13px;
      color: #b91c1c;
      max-width: 380px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">📷</div>

    <div>
      <h1>Ekran skrinshoti</h1>
      <p style="margin-top: 0.5rem;">Tugmani bosing va brauzer sizdan ekranni ulashishga ruxsat so'raydi</p>
    </div>

    <button id="startBtn" onclick="startCapture()">
      📸 Skrinshot olish
    </button>

    <div id="statusMsg"></div>

    <div id="previewBox">
      <div class="preview-header">
        <span>Skrinshot natijasi</span>
        <button id="downloadBtn" onclick="downloadImg()">⬇ Yuklab olish</button>
      </div>
      <img id="preview" alt="Ekran skrinshoti" />
    </div>

    <div id="errorBox"></div>
  </div>

  <script>
    let imgDataUrl = null;

    async function startCapture() {
      const btn = document.getElementById('startBtn');
      const status = document.getElementById('statusMsg');
      const preview = document.getElementById('preview');
      const previewBox = document.getElementById('previewBox');
      const errorBox = document.getElementById('errorBox');

      errorBox.style.display = 'none';
      previewBox.style.display = 'none';
      status.style.display = 'block';
      status.textContent = 'Ruxsat so\'ralmoqda...';
      btn.disabled = true;

      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: 'always' },
          audio: false
        });

        status.textContent = 'Skrinshot olinmoqda...';

        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        await new Promise(r => setTimeout(r, 300));

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        stream.getTracks().forEach(t => t.stop());

        imgDataUrl = canvas.toDataURL('image/png');
        preview.src = imgDataUrl;
        previewBox.style.display = 'block';
        status.textContent = '✅ Tayyor!';

      } catch (err) {
        errorBox.style.display = 'block';
        if (err.name === 'NotAllowedError') {
          errorBox.textContent = '❌ Ruxsat berilmadi. Iltimos, ulashishga ruxsat bering.';
        } else {
          errorBox.textContent = '❌ Xatolik: ' + err.message;
        }
        status.style.display = 'none';
      } finally {
        btn.disabled = false;
      }
    }

    function downloadImg() {
      if (!imgDataUrl) return;
      const a = document.createElement('a');
      a.href = imgDataUrl;
      a.download = 'skrinshot.png';
      a.click();
    }
  </script>
</body>
</html>
